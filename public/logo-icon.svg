<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img">
  <title>Prepwise Icon</title>
  <desc>Prepwise icon – a stylized lightbulb with circuit pattern</desc>

  <!-- Background Circle -->
  <circle cx="40" cy="40" r="38" fill="#EDE9FE"/>

  <!-- Lightbulb -->
  <path d="M40 12 C26 12 16 22 16 34 C16 44 22 52 32 57 L32 64 C32 67 34 68 37 68 L43 68 C46 68 48 67 48 64 L48 57 C58 52 64 44 64 34 C64 22 54 12 40 12 Z" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Circuit lines -->
  <line x1="40" y1="24" x2="40" y2="35" stroke="#7C3AED" stroke-width="1.8" fill="none"/>
  <line x1="40" y1="35" x2="31" y2="41" stroke="#7C3AED" stroke-width="1.8" fill="none"/>
  <line x1="40" y1="35" x2="49" y2="41" stroke="#7C3AED" stroke-width="1.8" fill="none"/>
  <line x1="31" y1="41" x2="31" y2="51" stroke="#7C3AED" stroke-width="1.8" fill="none"/>
  <line x1="49" y1="41" x2="49" y2="51" stroke="#7C3AED" stroke-width="1.8" fill="none"/>
  <line x1="31" y1="46" x2="49" y2="46" stroke="#7C3AED" stroke-width="1.8" fill="none"/>

  <!-- Circuit dots -->
  <circle cx="40" cy="24" r="2.5" fill="#7C3AED"/>
  <circle cx="40" cy="35" r="2.5" fill="#7C3AED"/>
  <circle cx="31" cy="41" r="2.5" fill="#7C3AED"/>
  <circle cx="49" cy="41" r="2.5" fill="#7C3AED"/>
  <circle cx="31" cy="51" r="2.5" fill="#7C3AED"/>
  <circle cx="49" cy="51" r="2.5" fill="#7C3AED"/>

  <!-- Bulb base -->
  <line x1="34" y1="68" x2="46" y2="68" stroke="#7C3AED" stroke-width="2" fill="none"/>
  <line x1="35" y1="72" x2="45" y2="72" stroke="#7C3AED" stroke-width="2" fill="none"/>
  <line x1="37" y1="76" x2="43" y2="76" stroke="#7C3AED" stroke-width="2" fill="none"/>
</svg>
